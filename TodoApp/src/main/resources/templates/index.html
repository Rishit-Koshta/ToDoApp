<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Todo Application</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="todo-container">

    <h4 class="text-center mb-4">
        <i class="bi bi-calendar-check"></i> TO-DO List
    </h4>

    <!-- Add Todo Form -->
    <form class="d-flex mb-4" th:action="@{/add}" method="post">
        <input
                type="text"
                name="title"
                placeholder="Add your task"
                class="form-control todo-input"
                required
        >
        <button type="submit" class="btn btn-add">
            ADD <span>+</span>
        </button>
    </form>

    <!-- Empty State -->
    <div th:if="${#lists.isEmpty(todos)}" class="text-center text-muted mb-3">
        No todos found
    </div>

    <!-- Todo List -->
    <div class="todo-list">
        <div th:each="todo : ${todos}" class="todo-item">

            <div class="d-flex align-items-center">
                <!-- Toggle Completed -->
                <a th:href="@{/update/{id}(id=${todo.id})}">
                    <i class="bi"
                       th:classappend="${todo.completed}
                       ? ' bi-check-circle-fill check-icon'
                       : ' bi-circle unchecked-icon'">
                    </i>
                </a>

                <!-- Todo Title -->
                <span
                        class="todo-text"
                        th:text="${todo.title}"
                        th:classappend="${todo.completed} ? ' completed' : ''">
                </span>
            </div>

            <!-- Delete -->
            <a th:href="@{/delete/{id}(id=${todo.id})}" class="delete-btn">
                <i class="bi bi-trash3"></i>
            </a>

        </div>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
